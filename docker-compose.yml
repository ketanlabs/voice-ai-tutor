# Full local stack: redis + self-hosted LiveKit + backend + voice + frontend.
# Everything is configured from the single root .env (see .env.example).
#
#   cp .env.example .env   # fill in keys
#   docker compose up --build

services:
  # ---- state store (owned only by the backend) ----------------------------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]  # durable across restarts
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"   # exposed for `redis-cli` debugging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- self-hosted LiveKit SFU --------------------------------------------
  livekit:
    image: livekit/livekit-server:latest
    # node-ip 127.0.0.1 makes media reachable from the host browser on a single
    # machine (paired with the published TCP/UDP ports below).
    command: --config /etc/livekit.yaml --node-ip 127.0.0.1
    environment:
      # livekit-server reads "APIkey: secret" pairs from LIVEKIT_KEYS.
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"                      # signaling (WebSocket)
      - "7881:7881"                      # TCP fallback for WebRTC
      - "50000-50019:50000-50019/udp"    # WebRTC media (UDP)
    depends_on:
      redis:
        condition: service_healthy

  # ---- backend / session-management + curriculum + state ------------------
  backend:
    build: ./backend
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    # Mount the exercise content so edits are picked up on `docker compose
    # restart backend` (the list is loaded at startup) — no rebuild needed.
    volumes:
      - ./backend/curriculum:/app/curriculum:ro
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ---- voice agent worker --------------------------------------------------
  voice:
    build: ./voice
    env_file: .env
    environment:
      LIVEKIT_URL: ws://livekit:7880
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
      livekit:
        condition: service_started

  # ---- frontend (Next.js) --------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* are inlined at build time (client bundle).
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    # Serve flashcard images live — drop files in frontend/public/flashcards/ and
    # they appear without a rebuild.
    volumes:
      - ./frontend/public/flashcards:/app/public/flashcards:ro
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis-data:
